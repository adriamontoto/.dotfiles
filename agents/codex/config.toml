model = "gpt-5.5"
web_search = "cached"
personality = "pragmatic"
model_verbosity = "low"
model_reasoning_effort = "medium"
plan_mode_reasoning_effort = "xhigh"
forced_login_method = "chatgpt"
cli_auth_credentials_store = "keyring"
mcp_oauth_credentials_store = "keyring"
file_opener = "vscode"
hide_agent_reasoning = false
show_raw_agent_reasoning = false
disable_paste_burst = false
check_for_update_on_startup = true
approval_policy = "on-request"
approvals_reviewer = "user"
sandbox_mode = "workspace-write"
default_permissions = "locked_workspace"

[profiles.deep-review]
model = "gpt-5.5"
model_reasoning_effort = "xhigh"
web_search = "live"

[profiles.lightweight]
model = "gpt-5.5"
model_reasoning_effort = "low"
web_search = "cached"

[features]
unified_exec = true
shell_snapshot = true
steer = true
use_linux_sandbox_bwrap = true
multi_agent = true
apps = true
browser_use = true
browser_use_external = true
computer_use = true
goals = true
hooks = true
image_generation = true
personality = true
plugins = true
enable_request_compression = true
guardian_approval = true
in_app_browser = true
shell_tool = true
skill_mcp_dependency_install = true
tool_call_mcp_elicitation = true
tool_search = true
tool_suggest = true
unavailable_dummy_tools = true
workspace_dependencies = true

[analytics]
enabled = false

[feedback]
enabled = false

[mcp_servers.deepwiki]
url = "https://mcp.deepwiki.com/mcp"

[mcp_servers.linear]
url = "https://mcp.linear.app/mcp"

[mcp_servers.notion]
url = "https://mcp.notion.com/mcp"

[mcp_servers.chrome-devtools]
command = "npx"
args = ["chrome-devtools-mcp@latest"]

[tui]
status_line = [
    "model-with-reasoning",
    "git-branch",
    "context-remaining",
    "five-hour-limit",
    "weekly-limit",
]
theme = "one-half-dark"
notifications = ["agent-turn-complete", "approval-requested"]
notification_method = "auto"
notification_condition = "unfocused"
animations = true
show_tooltips = true

[permissions.locked_workspace.filesystem]
glob_scan_max_depth = 5

[permissions.locked_workspace.filesystem.":project_roots"]
"." = "write"
".env" = "none"
".env.*" = "none"
".env.example" = "write"

[permissions.locked_workspace.filesystem."/workspace"]
"." = "write"
".env" = "none"
".env.*" = "none"
".env.example" = "write"

[permissions.locked_workspace.network]
enabled = false
